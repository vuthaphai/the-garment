name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: the_garment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test with Coverage
        working-directory: backend
        run: |
          mvn -B clean verify \
            -Dspring.r2dbc.url=r2dbc:postgresql://localhost:5432/the_garment_test \
            -Dspring.r2dbc.username=postgres \
            -Dspring.r2dbc.password=postgres \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/the_garment_test \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=postgres

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: backend/**/target/site/jacoco/

  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/the-garment-web-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/the-garment-web-app
        run: npm ci

      - name: Build
        working-directory: frontend/the-garment-web-app
        run: npm run build -- --configuration production

      - name: Test
        working-directory: frontend/the-garment-web-app
        run: npm test
