name: CD — Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com

jobs:
  deploy-backend:
    name: Deploy Backend Services
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Build & Push tg-data-adapter
        working-directory: backend/tg-data-adapter-service
        run: |
          docker build -t $ECR_REGISTRY/tg-data-adapter:${{ github.sha }} .
          docker push $ECR_REGISTRY/tg-data-adapter:${{ github.sha }}
          docker tag $ECR_REGISTRY/tg-data-adapter:${{ github.sha }} $ECR_REGISTRY/tg-data-adapter:latest
          docker push $ECR_REGISTRY/tg-data-adapter:latest

      - name: Build & Push tg-bff
        working-directory: backend/tg-bff-service
        run: |
          docker build -t $ECR_REGISTRY/tg-bff:${{ github.sha }} .
          docker push $ECR_REGISTRY/tg-bff:${{ github.sha }}
          docker tag $ECR_REGISTRY/tg-bff:${{ github.sha }} $ECR_REGISTRY/tg-bff:latest
          docker push $ECR_REGISTRY/tg-bff:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/the-garment
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            export DB_PASSWORD=$(aws secretsmanager get-secret-value --secret-id tg/db-password --query SecretString --output text)
            export JWT_SECRET=$(aws secretsmanager get-secret-value --secret-id tg/jwt-secret --query SecretString --output text)
            docker compose pull tg-data-adapter tg-bff
            docker compose up -d --no-deps tg-data-adapter tg-bff
            docker image prune -f

  deploy-frontend:
    name: Deploy Frontend to S3/CloudFront
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/the-garment-web-app/package-lock.json

      - name: Install & Build
        working-directory: frontend/the-garment-web-app
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/the-garment-web-app/dist/the-garment-web-app/browser/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          aws s3 cp frontend/the-garment-web-app/dist/the-garment-web-app/browser/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
