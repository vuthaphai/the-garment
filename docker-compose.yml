networks:
  tg-network:
    driver: bridge

volumes:
  postgres_data:

services:
  # ─── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - tg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-dbTheGarment_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Data Adapter Service ─────────────────────────────────────────────────
  tg-data-adapter:
    build:
      context: ./backend/tg-data-adapter-service
      dockerfile: Dockerfile
    container_name: tg-data-adapter
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dbTheGarment_dev}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    networks:
      - tg-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── BFF Service ─────────────────────────────────────────────────────────
  tg-bff:
    build:
      context: ./backend/tg-bff-service
      dockerfile: Dockerfile
    container_name: tg-bff
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATA_ADAPTER_URL: http://tg-data-adapter:8082
      JWT_SECRET: ${JWT_SECRET:-thegarment-super-secret-key-must-be-at-least-32-chars}
      JWT_ACCESS_EXPIRY: 3600000
      JWT_REFRESH_EXPIRY: 86400000
    networks:
      - tg-network
    depends_on:
      - tg-data-adapter

  # ─── Frontend ─────────────────────────────────────────────────────────────
  tg-frontend:
    build:
      context: ./frontend/the-garment-web-app
      dockerfile: Dockerfile
    container_name: tg-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - tg-network
    depends_on:
      - tg-bff


