spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/the_garment_dev
    username: postgres
    password: ${DB_PASSWORD:postgres}
    pool:
      initial-size: 5
      max-size: 20
  datasource:
    url: jdbc:postgresql://localhost:5432/the_garment_dev
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

logging:
  level:
    com.thegarment: DEBUG
    org.springframework.r2dbc: DEBUG
